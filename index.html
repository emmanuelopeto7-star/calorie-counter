<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calorie Counter</h1>

    <div id="total-selection">
        <p> Total calories: <span id="total-calories">0</span></p>
    </div>
    <div id="form-section">
        <input type="text" id="food-name" placeholder="Food Name">
        <input type="number" id="calories" placeholder="Calories">
        <button id="add-btn">Add Food</button>

        <div id="list-section">
            <h2>food log</h2>
                <ul id="food-log"></ul>
                <button id="clear-btn">Start Over</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
